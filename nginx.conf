# nginx.conf – reverse proxy para o servidor Node.js vinext
# Porta pública: 2000  →  App Node.js ouvindo em 3000 internamente
#
# Todos os paths de log e temp apontam para /tmp para compatibilidade
# com usuário não-root em containers Alpine.

worker_processes auto;

# Logs e PID em /tmp (gravável por qualquer usuário)
error_log  /tmp/nginx-error.log warn;
pid        /tmp/nginx.pid;

# Diretórios temporários em /tmp
# (evita Permission denied em /var/lib/nginx/tmp)
client_body_temp_path  /tmp/client_body;
proxy_temp_path        /tmp/proxy_temp;
fastcgi_temp_path      /tmp/fastcgi_temp;
uwsgi_temp_path        /tmp/uwsgi_temp;
scgi_temp_path         /tmp/scgi_temp;

events {
    worker_connections 1024;
    use epoll;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ── Logging ─────────────────────────────────────────────
    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent"';
    access_log /tmp/nginx-access.log main;

    # ── Performance ──────────────────────────────────────────
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;
    types_hash_max_size 4096;

    # ── Gzip compression ─────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml
        font/woff2;

    # ── Upstream: vinext Node.js server ─────────────────────
    upstream vinext_app {
        server 127.0.0.1:3000;
        keepalive 32;
    }

    # ── Server block ─────────────────────────────────────────
    server {
        listen 2000;
        server_name _;

        # Security headers
        add_header X-Frame-Options        "SAMEORIGIN"  always;
        add_header X-Content-Type-Options "nosniff"     always;
        add_header Referrer-Policy        "strict-origin-when-cross-origin" always;

        # Cache imutável para assets estáticos do Next.js
        location /_next/static/ {
            proxy_pass http://vinext_app;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            add_header Cache-Control "public, max-age=31536000, immutable";
        }

        # Cache para arquivos públicos
        location /static/ {
            proxy_pass http://vinext_app;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            add_header Cache-Control "public, max-age=86400";
        }

        # Todas as demais rotas → Node.js
        location / {
            proxy_pass         http://vinext_app;
            proxy_http_version 1.1;

            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Upgrade           $http_upgrade;
            proxy_set_header Connection        "upgrade";

            proxy_read_timeout    60s;
            proxy_send_timeout    60s;
            proxy_connect_timeout 10s;

            # Não faz buffer de respostas SSR
            proxy_buffering off;
        }

        # Health check para o Coolify
        location /health {
            access_log off;
            return 200 "ok\n";
            add_header Content-Type text/plain;
        }
    }
}
